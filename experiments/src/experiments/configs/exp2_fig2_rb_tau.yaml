      idle_duration_ns: 20.0

    - label: tau40000
      tau_c: 40000
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

rb:
  compile_mode: weak
  gate_set: clifford_1q

circuit:
  type: RandomizedBenchmarking
  num_qubits: 1
  idle_insert_prob: 0.0
  idle_duration_ns: 20.0

timing:
  t1: 20.0
  t2: 40.0
  tau_c: 40.0

noise:
  idle:
    enabled: true
    T1: 30e-6
    Tphi: 60e-6
    scale: 1.0

  ry_gate:
    enabled: true
    T1: 30e-6
    Tphi: 60e-6
    p_axis: 1e-4
    p_plane: 5e-4
    z_policy: virtual
    scale: 1.0

  photon_decay:
    enabled: true
    chi: "-2.6e6 * pi"
    alpha_0: "sqrt(0.8)"
    kappa: 4e6
    tau_m: -590e-9
    tau_g: 10e-9

  flux_quasistatic:
    enabled: true
    sigma: 0.10
    flux_seed: 987654321
    sampling:
      mode: local_correlated

logging:
  fid_probe:
    enabled: false
    per_m: 0
    outfile: "rb_probe.csv"
