experiment:
  name: exp2_fig2_rb_tau
  title: "Fig.2: RB mean survival vs tau_c at fixed sigma"
  seed: 20010416
  metric: survival
  fit_curve: exponential
  m_list: [64, 256, 1024]
  n_sequences: 300

  conditions:
    - label: tau20
      tau_c: 20
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

    - label: tau40
      tau_c: 40
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

    - label: tau60
      tau_c: 60
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

    - label: tau80
      tau_c: 80
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

    - label: tau120
      tau_c: 120
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

    - label: tau200
      tau_c: 200
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

    - label: tau400
      tau_c: 400
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

    - label: tau800
      tau_c: 800
      idle_insert_prob: 0.0
      idle_duration_ns: 20.0

    - label: tau1200
      tau_c: 1200
